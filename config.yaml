store:
  data_dir: "env:ROGUE_DATA"

helmet:
  require_approval: true
  root_resolver:
    type: env_match
    env: OWNER_ID
  powers_dir: ./power_sets
  agents_dir: ./agents

cerebro:
  default_provider: claude-code
  max_turns: 100
  max_agent_depth: 3
  tools: {}

telepath:
  sources:
    - type: telegram
      id: "telegram:rogue"
      token: "env:TELEGRAM_BOT_TOKEN_ROGUE"
      agent: rogue
      debounce_ms: 5000

scheduler:
  tick_interval: "30s"
